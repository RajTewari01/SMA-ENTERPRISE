version: "3.9"

services:
  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── API Gateway ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/inference/Dockerfile.inference
    ports:
      - "8000:8000"
    env_file:
      - env/config.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - media_data:/app/data

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/inference/Dockerfile.inference
    env_file:
      - env/config.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "core.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - media_data:/app/data

  # ── Celery Beat (Scheduler) ──────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/inference/Dockerfile.inference
    env_file:
      - env/config.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "core.celery_app", "beat", "--loglevel=info"]

volumes:
  redis_data:
  media_data:
